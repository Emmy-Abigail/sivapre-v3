services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sivapre_backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sivapre-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: postgis/postgis:16-3.4
    container_name: sivapre_db
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sivapre}
      POSTGRES_DB: ${POSTGRES_DB:-sivapre_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sivapre} -d ${POSTGRES_DB:-sivapre_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sivapre-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sivapre_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sivapre-network
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: sivapre_dashboard
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      - ./dashboard/dist:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - sivapre-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
  redis_data:

networks:
  sivapre-network:
    driver: bridge
